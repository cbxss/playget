name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.18"

      - name: Validate version
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          embedded="$(tr -d '[:space:]' < internal/assets/VERSION)"
          tag="${GITHUB_REF_NAME#v}"
          if [[ "$version" != "$tag" ]]; then
            echo "VERSION ($version) does not match tag ($tag)" >&2
            exit 1
          fi
          if [[ "$embedded" != "$tag" ]]; then
            echo "internal/assets/VERSION ($embedded) does not match tag ($tag)" >&2
            exit 1
          fi

      - name: Check
        shell: bash
        run: |
          set -euo pipefail
          scripts/smoke.sh

      - name: Package
        shell: bash
        run: scripts/package-release.sh

      - name: Release notes
        shell: bash
        run: |
          set -euo pipefail
          notes="$RUNNER_TEMP/release-notes.md"
          printf '%s\n' \
            'Install:' \
            '' \
            '```sh' \
            'curl -fsSL https://github.com/cbxss/playget/releases/latest/download/install.sh | bash' \
            '```' \
            '' \
            'Assets include native Go binaries for Linux on amd64/arm64.' \
            > "$notes"
          printf 'RELEASE_NOTES=%s\n' "$notes" >> "$GITHUB_ENV"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          mapfile -t assets < <(find dist -maxdepth 1 -type f | sort)
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" \
              --title "playget $tag" \
              --notes-file "$RELEASE_NOTES"
          fi
